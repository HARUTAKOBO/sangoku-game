<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ヘックス陣取り大戦 - ターン制戦闘導入版</title>
    <style>
        html, body { background-color: #1e272e; color: #ecf0f1; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; touch-action: none; overscroll-behavior: none; }
        
        #setup-screen { position: absolute; width: 100%; height: 100%; background: #2c3e50; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; touch-action: pan-y; padding-top: 20px; padding-bottom: 20px;}
        .warlord-card { background: #34495e; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; margin: 5px; width: 90%; max-width: 350px; cursor: pointer; text-align: left; }
        .warlord-card:hover { background: #e67e22; border-color: #fff;}
        .warlord-card h3 { margin: 0 0 5px 0; color: #f1c40f; }
        .warlord-card p { margin: 0; font-size: 0.85em; line-height: 1.3;}
        
        #top-bar { background: #000; padding: 5px 10px; display: flex; justify-content: space-between; font-size: 0.8em; flex-wrap: wrap; z-index: 10;}
        .stat { margin-right: 10px; margin-bottom: 3px; }
        .highlight { color: #f1c40f; font-weight: bold; }
        
        canvas { flex: 1; background-color: #34495e; width: 100%; height: 100%; display: block;}
        
        #action-panel { display: none; position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; box-sizing: border-box; z-index: 20; border-top: 2px solid #f1c40f;}
        #action-panel h4 { margin: 0 0 5px 0; color: #fff; }
        
        .troop-toggles { display: flex; justify-content: space-between; margin-bottom: 15px; margin-top: 10px;}
        .troop-toggle { flex: 1; margin: 0 3px; text-align: center; background: #2c3e50; border: 2px solid #7f8c8d; border-radius: 6px; padding: 8px 0; cursor: pointer; user-select: none; transition: 0.1s; }
        .troop-toggle.active { border-color: #f1c40f; background: #e67e22; }
        .troop-toggle .type-name { font-weight: bold; font-size: 0.9em; display: block; }
        .troop-toggle .type-count { font-size: 0.8em; color: #ecf0f1; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.95em; cursor: pointer; touch-action: manipulation;}
        .btn-attack { background: #e74c3c; color: #fff; }
        .btn-item { background: #3498db; color: #fff; }
        .btn-close { background: #7f8c8d; color: #fff; }
        
        #log-container { position: absolute; top: 60px; left: 10px; pointer-events: none; max-height: 150px; overflow: hidden; font-size: 0.8em; z-index: 5;}
        .log-entry { background: rgba(0,0,0,0.6); padding: 4px 8px; margin-bottom: 2px; border-radius: 3px; animation: fadeout 8s forwards;}
        @keyframes fadeout { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="margin:0 0 10px 0;">武将を選択せよ</h2>
        <div id="warlords"></div>
    </div>

    <div id="top-bar" style="display:none;">
        <div class="stat">所属: <span id="ui-team" class="highlight">-</span></div>
        <div class="stat">総兵力: <span id="ui-troops" class="highlight">10000</span> (上限100万)</div>
        <div class="stat">負傷: <span id="ui-wounded" class="highlight">0</span></div>
        <div class="stat">兵符: <span id="ui-tally" class="highlight">3</span></div>
        <div class="stat">加速: <span id="ui-speed" class="highlight">5</span></div>
    </div>

    <div id="log-container"></div>

    <canvas id="hexCanvas"></canvas>

    <div id="action-panel">
        <h4 id="panel-title">目標マスを選択中</h4>
        <p style="margin: 0; font-size:0.8em; color:#bdc3c7;" id="panel-info">地形効果: なし / 予想防衛兵力: ?</p>
        
        <div class="troop-toggles">
            <div class="troop-toggle active" id="toggle-spear" onclick="toggleTroop('spear')">
                <span class="type-name">槍兵</span><span class="type-count" id="ui-count-spear">2500</span>
            </div>
            <div class="troop-toggle active" id="toggle-bow" onclick="toggleTroop('bow')">
                <span class="type-name">弓兵</span><span class="type-count" id="ui-count-bow">2500</span>
            </div>
            <div class="troop-toggle active" id="toggle-shield" onclick="toggleTroop('shield')">
                <span class="type-name">盾兵</span><span class="type-count" id="ui-count-shield">2500</span>
            </div>
            <div class="troop-toggle active" id="toggle-cav" onclick="toggleTroop('cav')">
                <span class="type-name">騎兵</span><span class="type-count" id="ui-count-cav">2500</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-attack" onclick="sendAttack()">出陣 (計算中)</button>
            <button class="btn-item" onclick="useSpeedItem()">加速券</button>
            <button class="btn-close" onclick="closePanel()">戻る</button>
        </div>
        <div style="margin-top:10px; text-align:right;">
            <button class="btn-item" onclick="useTallyItem()" style="padding:6px 12px; font-size:0.85em;">兵符を使う(+5000)</button>
        </div>
    </div>

<script>
    const HEX_SIZE = 24;
    const MAP_RADIUS = 6;
    let gameActive = false;
    let selectedTargetKey = null;

    const TEAMS = [
        { id: 0, name: "NPC", color: "#7f8c8d" },
        { id: 1, name: "赤軍", color: "#e74c3c" },
        { id: 2, name: "青軍", color: "#3498db" },
        { id: 3, name: "緑軍", color: "#2ecc71" },
        { id: 4, name: "黄軍", color: "#f1c40f" },
        { id: 5, name: "紫軍", color: "#9b59b6" },
        { id: 6, name: "白軍", color: "#ecf0f1" }
    ];

    const TERRAINS = [
        { id: "plain", name: "平地", icon: "", adv: null, dis: null },
        { id: "sand", name: "砂地", icon: "🏜️", adv: "cav", dis: "shield" },
        { id: "forest", name: "森林", icon: "🌲", adv: ["bow", "spear"], dis: "cav" },
        { id: "river", name: "河川", icon: "💧", adv: "spear", dis: "all" }
    ];

    const WARLORDS = {
        'A': { name: "大将軍", desc: "派遣兵数1.2倍。力でねじ伏せる。" },
        'B': { name: "神速", desc: "加速券1.5倍(下限5秒)。最速の進軍。" },
        'C': { name: "慈悲", desc: "負傷兵の回復2倍。20%で完全消滅を免れる。" },
        'D': { name: "鉄壁", desc: "自陣の防御力1.3倍。要塞化。" },
        'E': { name: "戦術家", desc: "兵種相性の有利不利を2倍にする。" },
        'F': { name: "豪商", desc: "兵の自動補充+200/分。兵符の効果+1000。" }
    };

    let player = {
        teamId: 1,
        type: 'A',
        troops: { spear: 2500, bow: 2500, shield: 2500, cav: 2500 },
        wounded: 0,
        maxTroops: 1000000,
        items: { speed: 10, tally: 5 },
        speedMultiplier: 1
    };
    
    let selectedTroops = { spear: true, bow: true, shield: true, cav: true };
    let hexes = new Map();
    let marches = [];

    function initSetupUI() {
        const list = document.getElementById('warlords');
        for (let key in WARLORDS) {
            let w = WARLORDS[key];
            list.innerHTML += `<div class="warlord-card" onclick="startGame('${key}')">
                <h3>武将${key}【${w.name}】</h3><p>${w.desc}</p></div>`;
        }
    }

    function startGame(type) {
        player.type = type;
        player.teamId = Math.floor(Math.random() * 6) + 1;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('top-bar').style.display = 'flex';
        document.getElementById('ui-team').innerText = TEAMS[player.teamId].name;
        document.getElementById('ui-team').style.color = TEAMS[player.teamId].color;

        generateMap();
        gameActive = true;
        resize();
        requestAnimationFrame(render);
        setInterval(gameTick, 1000); // 1秒 = 1ティック
        logMsg(`武将${WARLORDS[type].name}として着任しました！`, "#f1c40f");
    }

    function generateMap() {
        hexes.clear();
        for (let q = -MAP_RADIUS; q <= MAP_RADIUS; q++) {
            let r1 = Math.max(-MAP_RADIUS, -q - MAP_RADIUS);
            let r2 = Math.min(MAP_RADIUS, -q + MAP_RADIUS);
            for (let r = r1; r <= r2; r++) {
                const s = -q - r;
                let t = TERRAINS[Math.floor(Math.random() * TERRAINS.length)];
                if(Math.abs(q)===MAP_RADIUS || Math.abs(r)===MAP_RADIUS || Math.abs(s)===MAP_RADIUS) t = TERRAINS[0];
                hexes.set(`${q},${r},${s}`, { 
                    q, r, s, team: 0, terrain: t,
                    defenders: { spear: 10, bow: 10, shield: 10, cav: 10 }
                });
            }
        }
        const hqs = [[6,-6,0,1],[6,0,-6,2],[0,6,-6,3],[-6,6,0,4],[-6,0,6,5],[0,-6,6,6]];
        hqs.forEach(h => {
            let target = hexes.get(`${h[0]},${h[1]},${h[2]}`);
            if(target) {
                target.team = h[3];
                target.defenders = { spear: 100, bow: 100, shield: 100, cav: 100 };
            }
        });
    }

    function getTotalTroops() { return player.troops.spear + player.troops.bow + player.troops.shield + player.troops.cav; }

    function gameTick() {
        if (!gameActive) return;

        let regenTotal = (player.type === 'F') ? 11.6 : 8.3; 
        let regenPerType = regenTotal / 4;
        if (getTotalTroops() < player.maxTroops) {
            player.troops.spear += regenPerType; player.troops.bow += regenPerType;
            player.troops.shield += regenPerType; player.troops.cav += regenPerType;
        }

        let healTotal = (player.type === 'C') ? 50 : 25;
        if (player.wounded > 0) {
            let healed = Math.min(player.wounded, healTotal);
            player.wounded -= healed;
            let healPerType = healed / 4;
            player.troops.spear += healPerType; player.troops.bow += healPerType;
            player.troops.shield += healPerType; player.troops.cav += healPerType;
        }

        updateUI();

        for (let i = marches.length - 1; i >= 0; i--) {
            let m = marches[i];
            m.timeLeft--;
            if (m.timeLeft <= 0) {
                resolveCombat(m);
                marches.splice(i, 1);
            }
        }
    }

    function resolveCombat(march) {
        let target = hexes.get(march.targetKey);
        if (!target || target.team === march.team) return;

        let att = march.troops;
        let def = target.defenders;
        
        let attPower = att.spear + att.bow + att.shield + att.cav;
        let defPower = def.spear + def.bow + def.shield + def.cav;
        
        let typeMultiplier = (player.type === 'E') ? 1.4 : 1.2;
        if(att.spear > def.cav) attPower *= typeMultiplier;
        if(att.cav > def.shield) attPower *= typeMultiplier;
        if(att.shield > def.bow) attPower *= typeMultiplier;
        if(att.bow > def.spear) attPower *= typeMultiplier;

        let t = target.terrain;
        if (t.adv === 'spear') attPower *= (att.spear > 0 ? 1.2 : 1);
        if (t.dis === 'cav') attPower *= (att.cav > 0 ? 0.8 : 1);

        if (target.team === player.teamId && player.type === 'D') defPower *= 1.3;

        let totalSent = att.spear + att.bow + att.shield + att.cav;

        if (attPower > defPower) {
            let prevOwner = TEAMS[target.team].name;
            target.team = march.team;
            target.defenders = { spear: 10, bow: 10, shield: 10, cav: 10 }; 
            
            let loss = Math.floor((defPower / attPower) * totalSent);
            player.wounded += loss;
            logMsg(`【制圧】${march.turns}ターンの激戦の末、${prevOwner}のマスを奪取！`, "#2ecc71");
        } else {
            if(player.type === 'C') player.wounded += Math.floor(totalSent * 0.2); 
            logMsg(`【敗北】${march.turns}ターン耐えられず、攻撃失敗...`, "#e74c3c");
        }
    }

    const canvas = document.getElementById('hexCanvas');
    const ctx = canvas.getContext('2d');

    canvas.addEventListener('click', (e) => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left - canvas.width/2;
        const y = e.clientY - rect.top - canvas.height/2;
        
        const q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE;
        const r = (2/3 * y) / HEX_SIZE;
        
        let rq = Math.round(q), rr = Math.round(r), rs = Math.round(-q-r);
        let dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-(-q-r));
        if(dq > dr && dq > ds) rq = -rr-rs; else if(dr > ds) rr = -rq-rs;
        
        const key = `${rq},${rr},${-rq-rr}`;
        const target = hexes.get(key);

        if (target && target.team !== player.teamId) {
            const neighbors = [[1,0,-1],[1,-1,0],[0,-1,1],[-1,0,1],[-1,1,0],[0,1,-1]].map(d => `${target.q+d[0]},${target.r+d[1]},${target.s+d[2]}`);
            const canAttack = neighbors.some(nKey => hexes.get(nKey)?.team === player.teamId);
            
            if (canAttack) {
                selectedTargetKey = key;
                openPanel(target);
            }
        }
    });

    function toggleTroop(type) {
        selectedTroops[type] = !selectedTroops[type];
        document.getElementById(`toggle-${type}`).classList.toggle('active', selectedTroops[type]);
        updateAttackButton();
    }

    function openPanel(hex) {
        document.getElementById('action-panel').style.display = 'block';
        let defCount = hex.defenders.spear + hex.defenders.bow + hex.defenders.shield + hex.defenders.cav;
        document.getElementById('panel-info').innerText = `地形: ${hex.terrain.name}${hex.terrain.icon} / 予想防衛兵力: 約${defCount}人`;
        player.speedMultiplier = 1;
        updateUI();
        updateAttackButton();
    }

    function closePanel() {
        document.getElementById('action-panel').style.display = 'none';
        selectedTargetKey = null;
    }

    function useSpeedItem() {
        if (player.items.speed > 0) {
            player.items.speed--;
            player.speedMultiplier *= (player.type === 'B' ? 1.5 : 2);
            updateAttackButton();
            updateUI();
        }
    }

    function useTallyItem() {
        if (player.items.tally > 0) {
            player.items.tally--;
            let bonus = (player.type === 'F' ? 6000 : 5000) / 4;
            player.troops.spear += bonus; player.troops.bow += bonus;
            player.troops.shield += bonus; player.troops.cav += bonus;
            updateUI();
            updateAttackButton(); // 兵数が増えて部隊数判定が変わる可能性のため
        }
    }

    // ★今回のキモ：選択部隊数からターンと秒数を算出するロジック★
    function getActiveSquadInfo() {
        let count = 0;
        // トグルがONになっていて、かつ兵力が1人以上いる兵種のみ「部隊」としてカウント
        if(selectedTroops.spear && player.troops.spear >= 1) count++;
        if(selectedTroops.bow && player.troops.bow >= 1) count++;
        if(selectedTroops.shield && player.troops.shield >= 1) count++;
        if(selectedTroops.cav && player.troops.cav >= 1) count++;

        let turns = 0, time = 0;
        if(count === 1) { turns = 10; time = 60; }
        else if(count === 2) { turns = 5; time = 30; }
        else if(count === 3) { turns = 4; time = 24; }
        else if(count === 4) { turns = 3; time = 18; }

        return { count, turns, time };
    }

    function updateAttackButton() {
        let info = getActiveSquadInfo();
        if (info.count === 0) {
            document.querySelector('.btn-attack').innerText = `部隊を選択してください`;
            document.querySelector('.btn-attack').style.opacity = "0.5";
            return;
        }
        
        document.querySelector('.btn-attack').style.opacity = "1";
        // 加速券の計算
        let finalTime = Math.max(Math.floor(info.time / player.speedMultiplier), player.type === 'B' ? 5 : 10);
        document.querySelector('.btn-attack').innerText = `出陣(${info.count}部隊) ${info.turns}ターン / ${finalTime}秒 ${player.speedMultiplier > 1 ? '⚡':''}`;
    }

    function sendAttack() {
        let info = getActiveSquadInfo();
        if (info.count === 0) return; // 0部隊なら不発

        let sent = { spear: 0, bow: 0, shield: 0, cav: 0 };

        if (selectedTroops.spear) { sent.spear = Math.floor(player.troops.spear); player.troops.spear = 0; }
        if (selectedTroops.bow) { sent.bow = Math.floor(player.troops.bow); player.troops.bow = 0; }
        if (selectedTroops.shield) { sent.shield = Math.floor(player.troops.shield); player.troops.shield = 0; }
        if (selectedTroops.cav) { sent.cav = Math.floor(player.troops.cav); player.troops.cav = 0; }
        
        let finalTime = Math.max(Math.floor(info.time / player.speedMultiplier), player.type === 'B' ? 5 : 10);

        marches.push({
            team: player.teamId,
            targetKey: selectedTargetKey,
            troops: sent,
            turns: info.turns, // ログ表示用に保存
            timeLeft: finalTime
        });

        logMsg(`${info.count}部隊を同時派遣！ ${info.turns}ターン(${finalTime}秒)後に決着します。`);
        updateUI();
        closePanel();
    }

    function updateUI() {
        document.getElementById('ui-troops').innerText = Math.floor(getTotalTroops());
        document.getElementById('ui-wounded').innerText = Math.floor(player.wounded);
        document.getElementById('ui-speed').innerText = player.items.speed;
        document.getElementById('ui-tally').innerText = player.items.tally;
        
        document.getElementById('ui-count-spear').innerText = Math.floor(player.troops.spear);
        document.getElementById('ui-count-bow').innerText = Math.floor(player.troops.bow);
        document.getElementById('ui-count-shield').innerText = Math.floor(player.troops.shield);
        document.getElementById('ui-count-cav').innerText = Math.floor(player.troops.cav);
    }

    function logMsg(text, color="#fff") {
        const log = document.getElementById('log-container');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.color = color;
        entry.innerText = text;
        log.appendChild(entry);
        if(log.children.length > 5) log.removeChild(log.firstChild);
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);

    function render() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        hexes.forEach(hex => {
            const pos = { x: HEX_SIZE * (Math.sqrt(3) * hex.q + Math.sqrt(3)/2 * hex.r) + canvas.width/2, y: HEX_SIZE * (3/2 * hex.r) + canvas.height/2 };
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                let angle = Math.PI/180 * (60*i - 30);
                ctx.lineTo(pos.x + HEX_SIZE*Math.cos(angle), pos.y + HEX_SIZE*Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = TEAMS[hex.team].color;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.stroke();

            if(hex.terrain.icon) {
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(hex.terrain.icon, pos.x, pos.y);
            }
        });

        marches.forEach(m => {
            if(m.team === player.teamId) {
                let pos = { x: HEX_SIZE * (Math.sqrt(3) * hexes.get(m.targetKey).q + Math.sqrt(3)/2 * hexes.get(m.targetKey).r) + canvas.width/2, y: HEX_SIZE * (3/2 * hexes.get(m.targetKey).r) + canvas.height/2 };
                ctx.beginPath();
                ctx.arc(pos.x, pos.y - 10, 5, 0, Math.PI*2);
                ctx.fillStyle = "#f1c40f";
                ctx.fill();
            }
        });

        requestAnimationFrame(render);
    }

    initSetupUI();
</script>
</body>
</html>
